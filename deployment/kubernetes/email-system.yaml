apiVersion: v1
kind: Namespace
metadata:
  name: email-system

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: email-config
  namespace: email-system
data:
  NODE_ENV: "production"
  HOSTNAME: "mail.example.com"
  DOMAIN: "example.com"
  SMTP_PORT: "25"
  IMAP_PORT: "143"
  POP3_PORT: "110"

---
apiVersion: v1
kind: Secret
metadata:
  name: email-secrets
  namespace: email-system
type: Opaque
stringData:
  DB_USER: emailserver
  DB_PASSWORD: changeme
  DB_NAME: emailserver_db
  JWT_SECRET: "change-me-in-production"
  REDIS_PASSWORD: ""

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
  namespace: email-system
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /data/postgres

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: email-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: email-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: email-secrets
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: email-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-backend
  namespace: email-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: email-backend
  template:
    metadata:
      labels:
        app: email-backend
    spec:
      containers:
      - name: backend
        image: email-backend:latest
        imagePullPolicy: Never
        ports:
        - name: http
          containerPort: 3000
        - name: smtp
          containerPort: 25
        - name: imap
          containerPort: 143
        - name: pop3
          containerPort: 110
        envFrom:
        - configMapRef:
            name: email-config
        - secretRef:
            name: email-secrets
        env:
        - name: DB_HOST
          value: postgres
        - name: REDIS_HOST
          value: redis
        - name: BACKEND_PORT
          value: "3000"
        resources:
          limits:
            memory: "1Gi"
            cpu: "1000m"
          requests:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-gateway
  namespace: email-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: email-gateway
  template:
    metadata:
      labels:
        app: email-gateway
    spec:
      containers:
      - name: gateway
        image: email-gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: GATEWAY_PORT
          value: "8080"
        - name: LOG_LEVEL
          value: "info"
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: email-backend
  namespace: email-system
spec:
  selector:
    app: email-backend
  type: LoadBalancer
  ports:
  - name: http
    port: 3000
    targetPort: 3000
  - name: smtp
    port: 25
    targetPort: 25
  - name: imap
    port: 143
    targetPort: 143
  - name: pop3
    port: 110
    targetPort: 110

---
apiVersion: v1
kind: Service
metadata:
  name: email-gateway
  namespace: email-system
spec:
  selector:
    app: email-gateway
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: email-system
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: email-system
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
